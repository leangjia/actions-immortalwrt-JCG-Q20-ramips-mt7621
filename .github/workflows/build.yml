#
# Description: Build ImmortalWrt using GitHub Actions
#

name: Build ImmortalWrt Firmware

permissions: write-all

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      branch:
        description: 'ImmortalWrt 源码分支'
        required: true
        type: choice
        options:
          - master
          - openwrt-23.05
          - openwrt-24.10
      platform:
        description: '目标设备'
        required: true
        type: choice
        options:
          - x86_64
          - jcg-q20
          - wr1200js

  schedule:
    - cron: '0 12 * * 0'  # 每周日 12:00 UTC (北京时间 20:00)

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FREE_DISK_SH: scripts/free_disk_space.sh
  ENV_SH: scripts/environment.sh
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: ${{ github.event.inputs.branch || 'openwrt-24.10' }}
  PLATFORM: ${{ github.event.inputs.platform || 'jcg-q20' }}
  SETTINGS_SH: scripts/init-settings.sh
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.branch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.branch) || '["openwrt-24.10"]') }}
        platform: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.platform) || '["jcg-q20", "wr1200js", "x86_64"]') }}
      fail-fast: false

    env:
      PLATFORM_FILE: ${{ matrix.platform == 'x86_64' && 'configs/Target-X86.txt' || format('configs/Target-{0}.txt', matrix.platform) }}

    steps:
    - name: 检查代码
      uses: actions/checkout@main

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        chmod +x $FREE_DISK_SH && $FREE_DISK_SH
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq full-upgrade -y
        chmod +x $ENV_SH && $ENV_SH
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo rm -rf /var/lib/apt/lists/*
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 检查空间使用情况（清理情况）
      if: (!cancelled())
      run: df -hT

    - name: 克隆源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL --depth 100 -b ${{ matrix.branch }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd ./openwrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

    - name: 检查缓存
      id: check-cache
      uses: actions/cache@main
      with:
        key: ${{ matrix.platform }}-${{ matrix.branch }}-${{ env.WRT_HASH }}
        restore-keys: ${{ matrix.platform }}-${{ matrix.branch }}
        path: |
          ./openwrt/.ccache
          ./openwrt/staging_dir/host*
          ./openwrt/staging_dir/tool*

    - name: 开启 CCACHE 配置
      run: |
        echo 'CONFIG_DEVEL=y' >> openwrt/.config
        echo 'CONFIG_CCACHE=y' >> openwrt/.config

    - name: 安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 克隆 VNT 源码
      run: |
        git clone --depth 1 https://github.com/lmq8267/luci-app-vnt.git openwrt/package/vnt

    - name: 导入配置和执行脚本
      run: |
        [ -d files ] && mv files openwrt/files || echo "files not found"
        if [ -f $PLATFORM_FILE ]; then
          sed -i 's/\r$//' $PLATFORM_FILE
          cat $PLATFORM_FILE >> openwrt/.config
        fi
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/$SETTINGS_SH && $GITHUB_WORKSPACE/$SETTINGS_SH

    - name: 下载文件
      run: |
        cd openwrt
        make defconfig
        make download -j8 V=10
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 空间使用情况（编译前）
      if: (!cancelled())
      run: df -hT

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        make defconfig
        echo -e "$(nproc) thread compile"
        make -j$(($(nproc)+1)) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 空间使用情况（编译占用）
      if: (!cancelled())
      run: df -hT

    - name: 整理文件
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf *.buildinfo *.json *.manifest packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 生成发布标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        BRANCH="${{ matrix.branch }}"
        VERSION1="${BRANCH#*-}"
        PLATFORM="${{ matrix.platform }}"
        echo -e "🎉 ${PLATFORM} 平台\n✅ ${BRANCH} 源码\n❗️ ip地址 : 192.168.2.1\n✅ 预装 DDNS-GO\n✅ 预装 VNT (客户端+服务端)" >> release.txt
        echo "release_tag=$(date +"%Y.%m.%d-${VERSION1}_${PLATFORM}")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到发布
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
